<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자재/업체 관리</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family:sans-serif; margin:16px; background:#f8f8f8;}
input,select,button,textarea {
  width:100%; padding:10px; margin:6px 0; font-size:16px;
}
.card { background:#fff; padding:12px; border-radius:10px; margin-bottom:12px;}
table { width:100%; border-collapse:collapse;}
td,th { border:1px solid #ddd; padding:8px;}
tr:hover { background:#f1f7ff; cursor:pointer;}
</style>
</head>

<body>

<h2>업체 등록</h2>
<div class="card">
<input id="vendor_name" placeholder="업체명">
<button onclick="saveVendor()">업체 저장</button>
</div>

<h2>자재 관리</h2>
<div class="card">

<select id="vendor_select"></select>

<input id="item_code" readonly placeholder="자동코드">
<input id="item_name" placeholder="자재명">
<input id="spec" placeholder="규격">
<input id="unit" placeholder="단위">
<input id="stock_qty" readonly placeholder="현재고">
<textarea id="note" placeholder="비고"></textarea>

<button onclick="saveMaterial()">자재 저장</button>
<button onclick="updateMaterial()">수정 저장</button>
<button onclick="resetForm()">신규</button>

</div>

<div class="card">
<h3>재고 변경</h3>

<select id="type">
<option value="IN">입고</option>
<option value="OUT">사용</option>
<option value="ADJUST">조정</option>
</select>

<input id="qty" type="number" placeholder="수량">
<button onclick="changeStock()">재고 반영</button>
</div>

<div class="card">
<h3>목록</h3>
<table>
<thead>
<tr>
<th>업체</th><th>코드</th><th>자재</th><th>재고</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>
</div>

<script>

const url = "https://gmqjbkqttkkotvvjnsiz.supabase.co";
const key = "sb_publishable_NGNO5UWtbkgCWQQ6jwTe6Q_4evcuVD9";
const db = supabase.createClient(url,key);

let selected = null;

async function saveVendor(){
  const name = document.getElementById("vendor_name").value;
  await db.from("vendors").insert([{vendor_name:name}]);
  loadVendor();
}

async function loadVendor(){
  const {data} = await db.from("vendors").select("*");
  const sel = document.getElementById("vendor_select");
  sel.innerHTML="";
  data.forEach(v=>{
    sel.innerHTML += `<option value="${v.id}">${v.vendor_name}</option>`;
  });
}

function makeCode(n){
  return "item_" + String(n).padStart(5,"0");
}

async function getNextCode(){
  const {data} = await db.from("materials")
    .select("item_code")
    .order("item_code",{ascending:false})
    .limit(1);

  if(!data.length) return "item_00001";

  const num = parseInt(data[0].item_code.replace("item_",""))+1;
  return makeCode(num);
}

async function saveMaterial(){
  const code = await getNextCode();
  const vendor_id = document.getElementById("vendor_select").value;

  const item = {
    vendor_id,
    item_code:code,
    item_name:document.getElementById("item_name").value,
    spec:document.getElementById("spec").value,
    unit:document.getElementById("unit").value,
    stock_qty:0,
    note:document.getElementById("note").value
  };

  await db.from("materials").insert([item]);
  alert("저장완료");
  load();
  resetForm();
}

async function updateMaterial(){
  if(!selected) return alert("선택 먼저");

  await db.from("materials")
    .update({
      item_name:document.getElementById("item_name").value,
      spec:document.getElementById("spec").value,
      unit:document.getElementById("unit").value,
      note:document.getElementById("note").value
    })
    .eq("id",selected.id);

  load();
}

function selectRow(r){
  selected = r;

  document.getElementById("item_code").value = r.item_code;
  document.getElementById("item_name").value = r.item_name;
  document.getElementById("spec").value = r.spec;
  document.getElementById("unit").value = r.unit;
  document.getElementById("stock_qty").value = r.stock_qty;
  document.getElementById("note").value = r.note;

  document.getElementById("vendor_select").value = r.vendor_id;
}

async function changeStock(){

  if(!selected) return alert("자재 선택");

  const type = document.getElementById("type").value;
  const qty = Number(document.getElementById("qty").value);

  let stock = selected.stock_qty;

  if(type==="IN") stock += qty;
  if(type==="OUT") stock -= qty;
  if(type==="ADJUST") stock = qty;

  await db.from("materials")
    .update({stock_qty:stock})
    .eq("id",selected.id);

  load();
}

async function load(){

  const {data} = await db
    .from("materials")
    .select("*,vendors(vendor_name)");

  const body = document.getElementById("body");
  body.innerHTML="";

  data.forEach(r=>{
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${r.vendors?.vendor_name || ""}</td>
      <td>${r.item_code}</td>
      <td>${r.item_name}</td>
      <td>${r.stock_qty}</td>
    `;

    tr.onclick = ()=>selectRow(r);

    body.appendChild(tr);
  });
}

function resetForm(){
  selected=null;
  document.querySelectorAll("input,textarea").forEach(i=>i.value="");
}

async function init(){
  await loadVendor();
  await load();
  document.getElementById("item_code").value = await getNextCode();
}

init();

</script>

</body>
</html>
