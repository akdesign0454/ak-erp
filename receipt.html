<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입고 처리</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: sans-serif;
    margin: 0;
    padding: 16px;
    background: #f8f8f8;
  }

  .container {
    max-width: 1080px;
    margin: 0 auto;
  }

  input, button, textarea {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    font-size: 16px;
    box-sizing: border-box;
  }

  .table-input {
    min-width: 90px;
    width: 100%;
    margin: 0;
    padding: 8px;
    font-size: 14px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
  }

  td, th {
    border: 1px solid #ddd;
    padding: 8px;
    font-size: 14px;
    vertical-align: middle;
    text-align: left;
    white-space: nowrap;
  }

  tr:hover {
    background: #f1f7ff;
    cursor: pointer;
  }

  .selected {
    background: #dbeafe !important;
  }

  .card {
    background: #fff;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 12px;
    border: 1px solid #ddd;
  }

  .done {
    color: #0a7a0a;
    font-weight: bold;
  }

  .warn {
    color: #b26a00;
    font-weight: bold;
  }

  .small {
    font-size: 13px;
    color: #666;
  }

  .table-wrap {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .order-table {
    min-width: 620px;
  }

  .item-table {
    min-width: 860px;
  }

  @media (max-width: 768px) {
    body {
      padding: 12px;
    }

    .container {
      max-width: 100%;
    }

    .card {
      padding: 10px;
    }
  }
</style>
</head>

<body>

<div class="container">

  <h2>입고 처리</h2>

  <div class="card">
    <div class="small">최근 발주 10개를 보고 선택한 뒤 조회합니다.</div>
    <button onclick="loadRecent()">최근 발주 보기</button>
  </div>

  <div class="card">
    <div class="table-wrap">
      <table class="order-table">
        <thead>
          <tr>
            <th>발주번호</th>
            <th>업체명</th>
            <th>발주일</th>
          </tr>
        </thead>
        <tbody id="orderBody"></tbody>
      </table>
    </div>
    <button onclick="loadSelected()">선택 발주 조회</button>
  </div>

  <div class="card">
    <h3>선택 발주 정보</h3>
    <input id="selected_order_no" readonly placeholder="발주번호">
    <input id="selected_vendor_name" readonly placeholder="업체명">
    <input id="selected_order_date" readonly placeholder="발주일">
    <textarea id="receipt_memo" placeholder="이번 입고 메모"></textarea>
  </div>

  <div class="card">
    <h3>입고 항목</h3>
    <div class="small">잔량보다 많이 입력하면 막습니다. 완료된 항목은 잠깁니다.</div>
    <div class="table-wrap">
      <table class="item-table">
        <thead>
          <tr>
            <th>자재명</th>
            <th>발주수량</th>
            <th>누적입고</th>
            <th>잔량</th>
            <th>현재고</th>
            <th>이번 입고수량</th>
            <th>상태</th>
          </tr>
        </thead>
        <tbody id="itemBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <button onclick="process()">입고 처리</button>
  </div>

</div>

<script>
const url = "https://gmqjbkqttkkotvvjnsiz.supabase.co";
const key = "sb_publishable_NGNO5UWtbkgCWQQ6jwTe6Q_4evcuVD9";
const db = supabase.createClient(url, key);

let selectedId = null;
let selectedHeader = null;
let items = [];

async function loadRecent() {
  const { data, error } = await db
    .from("purchase_lists")
    .select("*")
    .order("created_at", { ascending: false })
    .limit(10);

  if (error) {
    alert("최근 발주 조회 실패: " + error.message);
    return;
  }

  const body = document.getElementById("orderBody");
  body.innerHTML = "";

  data.forEach(r => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${r.order_no ?? ""}</td>
      <td>${r.vendor_name ?? ""}</td>
      <td>${r.order_date ?? ""}</td>
    `;

    tr.onclick = () => {
      document.querySelectorAll("#orderBody tr").forEach(x => x.classList.remove("selected"));
      tr.classList.add("selected");
      selectedId = r.id;
      selectedHeader = r;
    };

    body.appendChild(tr);
  });
}

async function loadSelected() {
  if (!selectedId) {
    alert("발주를 먼저 선택하세요.");
    return;
  }

  document.getElementById("selected_order_no").value = selectedHeader?.order_no ?? "";
  document.getElementById("selected_vendor_name").value = selectedHeader?.vendor_name ?? "";
  document.getElementById("selected_order_date").value = selectedHeader?.order_date ?? "";

  const { data, error } = await db
    .from("purchase_list_items")
    .select("*")
    .eq("purchase_list_id", selectedId)
    .order("created_at", { ascending: true });

  if (error) {
    alert("발주 상세 조회 실패: " + error.message);
    return;
  }

  items = [];

  for (const row of data) {
    let currentStock = 0;

    if (row.material_id) {
      const { data: matData } = await db
        .from("materials")
        .select("stock_qty")
        .eq("id", row.material_id)
        .maybeSingle();

      currentStock = Number(matData?.stock_qty || 0);
    }

    const orderQty = Number(row.order_qty || 0);
    const receiptQty = Number(row.receipt_qty || 0);
    const remainQty = Math.max(orderQty - receiptQty, 0);
    const done = row.receipt_done || remainQty === 0;

    items.push({
      id: row.id,
      material_id: row.material_id,
      item_name_snapshot: row.item_name_snapshot ?? "",
      order_qty: orderQty,
      receipt_qty: receiptQty,
      remain_qty: remainQty,
      current_stock: currentStock,
      receive_qty: 0,
      receipt_done: done
    });
  }

  render();
}

function render() {
  const body = document.getElementById("itemBody");
  body.innerHTML = "";

  items.forEach((r, i) => {
    const statusText = r.receipt_done ? "입고완료" : "입고대기";
    const statusClass = r.receipt_done ? "done" : "warn";

    body.innerHTML += `
      <tr>
        <td>${r.item_name_snapshot}</td>
        <td>${r.order_qty}</td>
        <td>${r.receipt_qty}</td>
        <td>${r.remain_qty}</td>
        <td>${r.current_stock}</td>
        <td>
          <input
            class="table-input"
            type="number"
            min="0"
            max="${r.remain_qty}"
            value="0"
            ${r.receipt_done ? "disabled" : ""}
            onchange="setReceiveQty(${i}, this.value)">
        </td>
        <td class="${statusClass}">${statusText}</td>
      </tr>
    `;
  });
}

function setReceiveQty(index, value) {
  const qty = Number(value || 0);
  const remain = Number(items[index].remain_qty || 0);

  if (qty > remain) {
    alert("잔량보다 많이 입력할 수 없습니다.");
    items[index].receive_qty = remain;
    render();
    return;
  }

  items[index].receive_qty = qty < 0 ? 0 : qty;
}

async function process() {
  if (!selectedId) {
    alert("발주를 선택하세요.");
    return;
  }

  const memo = document.getElementById("receipt_memo").value.trim();
  const targets = items.filter(x => !x.receipt_done && Number(x.receive_qty) > 0);

  if (targets.length === 0) {
    alert("입고 처리할 수량을 입력하세요.");
    return;
  }

  if (!confirm("입고 처리 진행하시겠습니까?\n재고가 증가하고 입고이력이 저장됩니다.")) {
    return;
  }

  for (const r of targets) {
    if (!r.material_id) {
      alert(`자재 연결이 없는 항목입니다: ${r.item_name_snapshot}`);
      return;
    }

    if (Number(r.receive_qty) > Number(r.remain_qty)) {
      alert(`잔량 초과 항목이 있습니다: ${r.item_name_snapshot}`);
      return;
    }

    const { data: mat, error: matError } = await db
      .from("materials")
      .select("*")
      .eq("id", r.material_id)
      .single();

    if (matError) {
      alert("자재 조회 실패: " + matError.message);
      return;
    }

    const beforeQty = Number(mat.stock_qty || 0);
    const addQty = Number(r.receive_qty || 0);
    const newQty = beforeQty + addQty;

    const { error: updateMatError } = await db
      .from("materials")
      .update({
        stock_qty: newQty,
        updated_at: new Date().toISOString()
      })
      .eq("id", r.material_id);

    if (updateMatError) {
      alert("재고 업데이트 실패: " + updateMatError.message);
      return;
    }

    const newReceiptQty = Number(r.receipt_qty || 0) + addQty;
    const isDone = newReceiptQty >= Number(r.order_qty || 0);

    const { error: updateItemError } = await db
      .from("purchase_list_items")
      .update({
        receipt_qty: newReceiptQty,
        receipt_done: isDone,
        updated_at: new Date().toISOString()
      })
      .eq("id", r.id);

    if (updateItemError) {
      alert("입고상태 업데이트 실패: " + updateItemError.message);
      return;
    }

    const { error: logError } = await db
      .from("stock_logs")
      .insert([{
        material_id: r.material_id,
        change_type: "IN",
        qty: addQty,
        before_qty: beforeQty,
        after_qty: newQty,
        memo: `[입고] ${selectedHeader?.order_no ?? ""} / ${memo}`
      }]);

    if (logError) {
      alert("입고이력 저장 실패: " + logError.message);
      return;
    }
  }

  alert("입고 완료");
  await loadSelected();
}

loadRecent();
</script>

</body>
</html>
